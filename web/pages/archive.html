<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>录播表 | TimeZone</title>
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/themes/default.css" />
</head>
<body data-page="archive">
  <main class="page">
    <section class="page-card">
      <h1>录播日历（第一期：外链 B 站）</h1>
      <p class="muted">按日历查看回放日期。点当天条目可跳转 B 站。后续可升级为自动抓取。</p>

      <div class="calendar-toolbar">
        <button class="calendar-btn" id="calendar-prev" type="button" aria-label="查看上个月">上个月</button>
        <strong id="calendar-title">0000年00月</strong>
        <button class="calendar-btn" id="calendar-next" type="button" aria-label="查看下个月">下个月</button>
      </div>

      <div class="calendar-weekdays" aria-hidden="true">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="vod-calendar" id="vod-calendar" aria-label="录播日历"></div>

      <p class="hint">维护说明：回放数据请编辑 `web/data/vod-events.json`，并通过本地服务预览（不要直接双击 HTML）。</p>
      <p class="hint" id="calendar-status" aria-live="polite">正在载入录播数据...</p>
      <a class="back-link" href="../index.html">返回首页</a>
    </section>
  </main>
  <script src="../scripts/main.js"></script>
</body>
</html>
